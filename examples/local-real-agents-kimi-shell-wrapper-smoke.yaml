name: local-real-agents-kimi-shell-wrapper-smoke
description: Minimal parallel real-agent smoke test for local Codex plus Claude-on-Kimi via an explicit target.shell Kimi wrapper.
working_dir: .
concurrency: 2
local_target_defaults:
  shell: "bash -lic 'command -v kimi >/dev/null 2>&1 && kimi && {command}'"
nodes:
  - id: codex_plan
    agent: codex
    env:
      OPENAI_BASE_URL: ""
    prompt: |
      Reply with exactly: codex ok
    timeout_seconds: 180
    success_criteria:
      - kind: output_contains
        value: codex ok

  - id: claude_review
    agent: claude
    provider: kimi
    prompt: |
      Reply with exactly: claude ok
    timeout_seconds: 180
    success_criteria:
      - kind: output_contains
        value: claude ok
